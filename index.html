<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 용돈기입장</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- 1. 제목 영역 -->
      <header class="hero">
        <h1>나의 용돈기입장</h1>
        <p>수입과 지출을 기록하며 돈 관리 습관을 길러요</p>
      </header>

      <!-- 2. 총 수입 / 총 지출 / 현재 잔액 요약 카드 -->
      <section class="summary" aria-label="용돈 요약">
        <article class="summary-card income-card">
          <span>총 수입</span>
          <strong id="totalIncome">0원</strong>
        </article>
        <article class="summary-card expense-card">
          <span>총 지출</span>
          <strong id="totalExpense">0원</strong>
        </article>
        <article class="summary-card balance-card">
          <span>현재 잔액</span>
          <strong id="currentBalance">0원</strong>
        </article>
      </section>

      <!-- 3. 입력 폼 -->
      <section class="panel">
        <h2>새 기록 등록</h2>
        <form id="recordForm" class="record-form">
          <label>
            날짜
            <input id="dateInput" type="date" />
          </label>

          <label>
            구분
            <select id="typeInput">
              <option value="income">수입</option>
              <option value="expense">지출</option>
            </select>
          </label>

          <label>
            카테고리
            <select id="categoryInput"></select>
          </label>

          <label>
            항목명
            <input id="titleInput" type="text" placeholder="예: 용돈, 간식" />
          </label>

          <label>
            금액
            <input id="amountInput" type="number" min="1" placeholder="예: 5000" />
          </label>

          <label class="wide">
            메모
            <input id="memoInput" type="text" placeholder="선택 입력" />
          </label>

          <button class="primary-button" type="submit">등록하기</button>
        </form>
      </section>

      <!-- 4. 필터 버튼 -->
      <section class="filter-area" aria-label="기록 필터">
        <button class="filter-button active" type="button" data-filter="all">전체 보기</button>
        <button class="filter-button" type="button" data-filter="income">수입만 보기</button>
        <button class="filter-button" type="button" data-filter="expense">지출만 보기</button>
      </section>

      <!-- 추가 기능: 분석과 파일 내보내기에 사용할 기간 선택 -->
      <section class="panel tools-panel">
        <div>
          <h2>분석과 내보내기</h2>
          <p>선택한 기간의 카테고리 비율을 보고, 월별 기록을 파일로 저장할 수 있어요.</p>
        </div>

        <div class="period-controls">
          <label>
            분석 단위
            <select id="periodTypeInput">
              <option value="day">일자별</option>
              <option value="month" selected>월별</option>
              <option value="year">연도별</option>
            </select>
          </label>

          <label>
            기간
            <input id="periodValueInput" type="month" />
          </label>

          <label>
            내보낼 월
            <input id="exportMonthInput" type="month" />
          </label>
        </div>

        <div class="export-buttons">
          <button id="excelButton" class="soft-button" type="button">월별 엑셀 다운로드</button>
          <button id="googleSheetButton" class="soft-button" type="button">구글 시트로 보내기</button>
        </div>
      </section>

      <!-- 5. 카테고리별 비율 시각화 -->
      <section class="chart-grid" aria-label="카테고리별 비율 분석">
        <article class="panel chart-panel">
          <div class="chart-title">
            <h2>수입 카테고리 비율</h2>
            <span id="incomeChartTotal">0원</span>
          </div>
          <div class="donut-wrap">
            <div id="incomeDonut" class="donut empty"></div>
            <strong id="incomeDonutText">0%</strong>
          </div>
          <div id="incomeLegend" class="legend"></div>
        </article>

        <article class="panel chart-panel">
          <div class="chart-title">
            <h2>지출 카테고리 비율</h2>
            <span id="expenseChartTotal">0원</span>
          </div>
          <div class="donut-wrap">
            <div id="expenseDonut" class="donut empty"></div>
            <strong id="expenseDonutText">0%</strong>
          </div>
          <div id="expenseLegend" class="legend"></div>
        </article>
      </section>

      <!-- 6. 기록 목록 표 -->
      <section class="panel">
        <div class="table-title">
          <h2>기록 목록</h2>
          <span id="recordCount">0개</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>구분</th>
                <th>카테고리</th>
                <th>항목명</th>
                <th>금액</th>
                <th>메모</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="recordList">
              <!-- JavaScript가 여기에 기록을 추가합니다. -->
            </tbody>
          </table>
        </div>

        <p id="emptyMessage" class="empty-message">아직 등록된 기록이 없어요.</p>
      </section>

      <!-- 7. 전체 기록 초기화 버튼 -->
      <section class="reset-area">
        <button id="resetButton" class="reset-button" type="button">전체 기록 초기화</button>
      </section>

      <!-- 8. 하단 저작권 문구 -->
      <footer>
        © 2026 크레오디교육연구소
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
