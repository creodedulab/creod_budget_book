<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 용돈기입장</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- 1. 제목 영역 -->
      <header class="hero">
        <h1>나의 용돈기입장</h1>
        <p>수입과 지출을 기록하며 돈 관리 습관을 길러요</p>
      </header>

      <!-- 2. 총 수입 / 총 지출 / 현재 잔액 요약 카드 -->
      <section class="summary" aria-label="용돈 요약">
        <article class="summary-card income-card">
          <span>총 수입</span>
          <strong id="totalIncome">0원</strong>
        </article>
        <article class="summary-card expense-card">
          <span>총 지출</span>
          <strong id="totalExpense">0원</strong>
        </article>
        <article class="summary-card balance-card">
          <span>현재 잔액</span>
          <strong id="currentBalance">0원</strong>
        </article>
      </section>

      <!-- 3. 입력 폼 -->
      <section class="panel">
        <h2>새 기록 등록</h2>
        <form id="recordForm" class="record-form">
          <label>
            날짜
            <input id="dateInput" type="date" />
          </label>

          <label>
            구분
            <select id="typeInput">
              <option value="income">수입</option>
              <option value="expense">지출</option>
            </select>
          </label>

          <label>
            항목명
            <input id="titleInput" type="text" placeholder="예: 용돈, 간식" />
          </label>

          <label>
            금액
            <input id="amountInput" type="number" min="1" placeholder="예: 5000" />
          </label>

          <label class="wide">
            메모
            <input id="memoInput" type="text" placeholder="선택 입력" />
          </label>

          <button class="primary-button" type="submit">등록하기</button>
        </form>
      </section>

      <!-- 4. 필터 버튼 -->
      <section class="filter-area" aria-label="기록 필터">
        <button class="filter-button active" type="button" data-filter="all">전체 보기</button>
        <button class="filter-button" type="button" data-filter="income">수입만 보기</button>
        <button class="filter-button" type="button" data-filter="expense">지출만 보기</button>
      </section>

      <!-- 5. 기록 목록 표 -->
      <section class="panel">
        <div class="table-title">
          <h2>기록 목록</h2>
          <span id="recordCount">0개</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>구분</th>
                <th>항목명</th>
                <th>금액</th>
                <th>메모</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="recordList">
              <!-- JavaScript가 여기에 기록을 추가합니다. -->
            </tbody>
          </table>
        </div>

        <p id="emptyMessage" class="empty-message">아직 등록된 기록이 없어요.</p>
      </section>

      <!-- 6. 전체 기록 초기화 버튼 -->
      <section class="reset-area">
        <button id="resetButton" class="reset-button" type="button">전체 기록 초기화</button>
      </section>

      <!-- 7. 하단 저작권 문구 -->
      <footer>
        © 2026 크레오디교육연구소
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
